  <link rel="preconnect" href="https://fonts.googleapis.com">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlanPal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

  <div class="auth-card">
