<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — PlanPal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>

  <div class="auth-card">
    <div class="brand">
      <div class="brand-dot"></div>
      <span>PlanPal</span>
    </div>
    <p class="card-title">Log In</p>

    {% for message in messages %}
      <p style="color: red;">{{ message }}</p>
    {% endfor %}

    <form action="{% url 'log_in' %}" method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">
      {{ form.as_p }}
      <button class="auth-btn" type="submit">Log In</button>
    </form>

    <p class="auth-footer">Don't have an account? <a href="{% url 'sign_up' %}">Sign Up</a></p>
  </div>


</body>
</html>
